name: Deploy FleetFlow Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '20'
  IMAGE_NAME: fleetflow-pro

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: TypeScript type check
      run: npx tsc --noEmit
    
    - name: Lint
      run: npm run lint
    
    - name: Build
      run: npm run build
    
    - name: Run build verification
      run: node test-build.js

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Generate deployment artifacts
      run: |
        ./deploy.sh deploy-coolify
        ./deploy.sh deploy-vercel
        ls -la *.json
    
    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-configs
        path: |
          coolify-config.json
          vercel.json
        retention-days: 7

  deploy-notification:
    runs-on: ubuntu-latest
    needs: docker-build
    if: always()
    
    steps:
    - name: Deployment Summary
      run: |
        echo "🚀 FleetFlow Pro Deployment Pipeline Complete"
        echo "=========================================="
        echo ""
        echo "✅ Tests: ${{ needs.test.result }}"
        echo "✅ Docker Build: ${{ needs.docker-build.result }}"
        echo ""
        echo "📦 Next Steps:"
        echo "   1. Docker image built and pushed (if credentials provided)"
        echo "   2. Deployment configs generated in artifacts"
        echo "   3. Manual deployment required for production"
        echo ""
        echo "🔗 Quick deployment commands:"
        echo "   docker run -d --name fleetflow-pro -p 3000:3000 fleetflow-pro:latest"
        echo ""
        echo "📚 See README.md for complete deployment guide"