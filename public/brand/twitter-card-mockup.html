<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>FleetFlow Twitter Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1E3A5F 50%, #1e3a8a 100%);
    }
    .accent-gradient {
      background: linear-gradient(135deg, #3B82F6 0%, #10B981 100%);
    }
    .glow {
      box-shadow: 0 0 80px rgba(59, 130, 246, 0.4);
    }
  </style>
</head>
<body class="gradient-bg w-[1200px] h-[600px] relative overflow-hidden">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-5">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
          <circle cx="20" cy="20" r="2" fill="#ffffff"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots)"/>
    </svg>
  </div>
  
  <!-- Decorative Elements -->
  <div class="absolute top-[-200px] right-[-100px] w-[600px] h-[600px] rounded-full bg-blue-500/20 blur-3xl"></div>
  <div class="absolute bottom-[-200px] left-[-100px] w-[500px] h-[500px] rounded-full bg-green-500/10 blur-3xl"></div>
  
  <!-- Main Content - Centered -->
  <div class="relative z-10 flex flex-col items-center justify-center h-full text-center px-16">
    <!-- Logo -->
    <div class="flex items-center space-x-4 mb-8">
      <div class="w-20 h-20 accent-gradient rounded-2xl flex items-center justify-center glow">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <span class="text-5xl font-black text-white tracking-tight">FleetFlow</span>
    </div>
    
    <!-- Tagline -->
    <h1 class="text-6xl font-bold text-white leading-tight mb-6">
      Fleet Management,<br/>
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400">Simplified</span>
    </h1>
    
    <!-- Description -->
    <p class="text-2xl text-gray-300 mb-10 max-w-2xl">
      The all-in-one platform for modern fleet operations. Track vehicles, manage deliveries, and optimize maintenance.
    </p>
    
    <!-- Feature Pills -->
    <div class="flex items-center space-x-4">
      <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-6 py-3 flex items-center space-x-2">
        <div class="w-3 h-3 bg-green-400 rounded-full"></div>
        <span class="text-white font-medium">Vehicle Tracking</span>
      </div>
      <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-6 py-3 flex items-center space-x-2">
        <div class="w-3 h-3 bg-blue-400 rounded-full"></div>
        <span class="text-white font-medium">Route Optimization</span>
      </div>
      <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-full px-6 py-3 flex items-center space-x-2">
        <div class="w-3 h-3 bg-purple-400 rounded-full"></div>
        <span class="text-white font-medium">Maintenance AI</span>
      </div>
    </div>
  </div>
  
  <!-- Bottom Bar -->
  <div class="absolute bottom-0 left-0 right-0 h-16 bg-black/20 backdrop-blur-sm flex items-center justify-center">
    <span class="text-gray-400 text-lg">fleetflow.app</span>
  </div>
</body>
</html>
