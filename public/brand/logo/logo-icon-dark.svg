<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="darkIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="darkAccentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle - lighter for dark theme -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#darkIconGradient)"/>
  
  <!-- Abstract Fleet/Flow Symbol -->
  <g fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arrow -->
    <path d="M128 176 L256 128 L384 176"/>
    <path d="M256 128 L256 224"/>
    
    <!-- Middle arrow (accent) -->
    <path d="M128 288 L256 240 L384 288" stroke="url(#darkAccentGradient)" stroke-width="28"/>
    <path d="M256 240 L256 336" stroke="url(#darkAccentGradient)" stroke-width="28"/>
    
    <!-- Bottom arrow -->
    <path d="M128 400 L256 352 L384 400"/>
    <path d="M256 352 L256 400"/>
  </g>
  
  <!-- Connection dots -->
  <circle cx="128" cy="176" r="12" fill="white" opacity="0.9"/>
  <circle cx="384" cy="176" r="12" fill="white" opacity="0.9"/>
  <circle cx="128" cy="288" r="14" fill="#34D399"/>
  <circle cx="384" cy="288" r="14" fill="#34D399"/>
  <circle cx="128" cy="400" r="12" fill="white" opacity="0.9"/>
  <circle cx="384" cy="400" r="12" fill="white" opacity="0.9"/>
</svg>