<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>
  
  <!-- Decorative peaceful elements -->
  <circle cx="40" cy="50" r="8" fill="#dbeafe" opacity="0.6"/>
  <circle cx="160" cy="60" r="6" fill="#d1fae5" opacity="0.6"/>
  <circle cx="50" cy="150" r="10" fill="#fef3c7" opacity="0.5"/>
  <circle cx="155" cy="140" r="7" fill="#fce7f3" opacity="0.5"/>
  
  <!-- Bell icon -->
  <g transform="translate(100, 90)">
    <!-- Bell body -->
    <path d="M-35,-20 
             C-35,-45 -20,-55 0,-55 
             C20,-55 35,-45 35,-20 
             L35,15 
             C35,20 40,25 45,30 
             L-45,30 
             C-40,25 -35,20 -35,15 
             Z" 
          fill="url(#bellGradient)"/>
    
    <!-- Bell rim highlight -->
    <ellipse cx="0" cy="-55" rx="12" ry="8" fill="#1E3A5F"/>
    
    <!-- Bell shine -->
    <ellipse cx="-15" cy="-25" rx="8" ry="15" fill="white" opacity="0.2" transform="rotate(-10)"/>
    
    <!-- Clapper -->
    <circle cx="0" cy="38" r="10" fill="#64748B"/>
    
    <!-- Checkmark badge -->
    <g transform="translate(25, -35)">
      <circle cx="0" cy="0" r="20" fill="url(#checkGradient)"/>
      <circle cx="0" cy="0" r="16" fill="#10B981"/>
      <!-- Checkmark -->
      <path d="M-8,0 L-3,5 L8,-8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Zzz sleeping symbols suggesting peace -->
  <g fill="#94a3b8" opacity="0.4">
    <text x="145" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="300">z</text>
    <text x="155" y="45" font-family="system-ui, sans-serif" font-size="10" font-weight="300">z</text>
  </g>
  
  <!-- Subtle sparkle accents -->
  <g fill="#fbbf24" opacity="0.5">
    <circle cx="35" cy="100" r="3"/>
    <circle cx="165" cy="110" r="2"/>
  </g>
</svg>