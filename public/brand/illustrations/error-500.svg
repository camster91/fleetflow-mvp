<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="brokenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" fill="url(#bgGradient)"/>
  
  <!-- Warning stripes decoration -->
  <g opacity="0.1">
    <rect x="0" y="0" width="600" height="20" fill="#fbbf24"/>
    <path d="M0,20 L30,0 L60,20 L90,0 L120,20 L150,0 L180,20 L210,0 L240,20 L270,0 L300,20 L330,0 L360,20 L390,0 L420,20 L450,0 L480,20 L510,0 L540,20 L570,0 L600,20" fill="#f59e0b"/>
  </g>
  
  <!-- Server rack -->
  <g transform="translate(380, 80)">
    <!-- Main server body -->
    <rect x="0" y="0" width="140" height="200" rx="8" fill="#1e293b"/>
    <rect x="8" y="8" width="124" height="184" rx="4" fill="#334155"/>
    
    <!-- Server units -->
    <rect x="16" y="20" width="108" height="20" rx="2" fill="#1e293b"/>
    <circle cx="28" cy="30" r="4" fill="#10B981"/>
    <rect x="40" y="26" width="40" height="8" rx="2" fill="#475569"/>
    <circle cx="110" cy="30" r="3" fill="#3B82F6"/>
    
    <rect x="16" y="50" width="108" height="20" rx="2" fill="#1e293b"/>
    <circle cx="28" cy="60" r="4" fill="#ef4444"/>
    <rect x="40" y="56" width="40" height="8" rx="2" fill="#475569"/>
    <circle cx="110" cy="60" r="3" fill="#ef4444" filter="url(#glow)"/>
    
    <rect x="16" y="80" width="108" height="20" rx="2" fill="#1e293b"/>
    <circle cx="28" cy="90" r="4" fill="#ef4444"/>
    <rect x="40" y="86" width="40" height="8" rx="2" fill="#475569"/>
    <circle cx="110" cy="90" r="3" fill="#ef4444"/>
    
    <rect x="16" y="110" width="108" height="20" rx="2" fill="#1e293b"/>
    <circle cx="28" cy="120" r="4" fill="#10B981"/>
    <rect x="40" y="116" width="40" height="8" rx="2" fill="#475569"/>
    <circle cx="110" cy="120" r="3" fill="#3B82F6"/>
    
    <rect x="16" y="140" width="108" height="20" rx="2" fill="#1e293b"/>
    <circle cx="28" cy="150" r="4" fill="#fbbf24"/>
    <rect x="40" y="146" width="40" height="8" rx="2" fill="#475569"/>
    <circle cx="110" cy="150" r="3" fill="#fbbf24"/>
    
    <!-- Warning indicator -->
    <g transform="translate(55, 175)">
      <circle cx="15" cy="10" r="12" fill="#ef4444" filter="url(#glow)"/>
      <text x="15" y="15" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="bold" text-anchor="middle">!</text>
    </g>
    
    <!-- Smoke/spark effects -->
    <g opacity="0.4">
      <circle cx="70" cy="-10" r="8" fill="#94a3b8"/>
      <circle cx="60" cy="-25" r="6" fill="#94a3b8"/>
      <circle cx="80" cy="-20" r="5" fill="#94a3b8"/>
    </g>
  </g>
  
  <!-- Broken gear -->
  <g transform="translate(120, 100)">
    <!-- Main gear shape with missing teeth -->
    <path d="M80,10 
             L90,10 L95,0 L115,0 L120,10 
             L130,15 L138,8 L153,18 L148,28
             L155,35 L165,30 L175,45 L165,55
             L168,65 L178,68 L178,88 L168,92
             L165,100 L175,110 L165,125 L155,120
             L148,128 L153,140 L138,148 L130,140
             L120,145 L115,158 L95,158 L90,145
             L80,142 L72,152 L55,145 L58,132
             L50,128 L40,138 L25,125 L35,115
             L32,105 L20,108 L15,90 L28,85
             L28,72 L15,68 L20,50 L32,52
             L38,42 L28,32 L42,18 L52,28
             L62,22 L65,8 L80,10 Z" 
          fill="url(#gearGradient)"/>
    
    <!-- Missing teeth cracks -->
    <path d="M145,100 L160,115 L150,125" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <path d="M55,75 L40,90 L50,105" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Gear center -->
    <circle cx="95" cy="80" r="35" fill="#1e293b"/>
    <circle cx="95" cy="80" r="20" fill="#64748B"/>
    <circle cx="95" cy="80" r="10" fill="#94a3b8"/>
    
    <!-- Broken piece falling -->
    <g transform="translate(160, 140) rotate(30)">
      <path d="M0,0 L20,5 L18,25 L-5,20 Z" fill="#3B82F6"/>
      <path d="M0,0 L20,5" stroke="#ef4444" stroke-width="2"/>
    </g>
    
    <!-- Warning triangle overlay -->
    <g transform="translate(140, 50)">
      <path d="M0,40 L35,0 L70,40 Z" fill="#fbbf24" opacity="0.9"/>
      <path d="M10,35 L35,8 L60,35 Z" fill="#fef3c7"/>
      <text x="35" y="32" font-family="system-ui, sans-serif" font-size="20" fill="#f59e0b" font-weight="bold" text-anchor="middle">!</text>
    </g>
  </g>
  
  <!-- Error code at bottom -->
  <text x="300" y="360" font-family="system-ui, sans-serif" font-size="48" fill="#1E3A5F" font-weight="bold" text-anchor="middle" opacity="0.15">500 SERVER ERROR</text>
  
  <!-- Connection lines suggesting broken network -->
  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" opacity="0.5">
    <line x1="280" y1="150" x2="350" y2="120"/>
    <line x1="280" y1="180" x2="360" y2="160"/>
    <line x1="270" y1="210" x2="350" y2="200"/>
  </g>
  
  <!-- X marks showing broken connections -->
  <g transform="translate(315, 135)">
    <line x1="0" y1="0" x2="15" y2="15" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="0" x2="0" y2="15" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>