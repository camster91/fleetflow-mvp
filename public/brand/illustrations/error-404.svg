<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect x="0" y="0" width="600" height="250" fill="url(#skyGradient)"/>
  
  <!-- Decorative clouds -->
  <g fill="#ffffff" opacity="0.8">
    <ellipse cx="100" cy="60" rx="40" ry="20"/>
    <ellipse cx="130" cy="70" rx="35" ry="18"/>
    <ellipse cx="70" cy="70" rx="30" ry="15"/>
    
    <ellipse cx="500" cy="50" rx="45" ry="22"/>
    <ellipse cx="535" cy="60" rx="38" ry="19"/>
    <ellipse cx="465" cy="60" rx="32" ry="16"/>
  </g>
  
  <!-- Road/ground -->
  <rect x="0" y="250" width="600" height="150" fill="url(#roadGradient)"/>
  
  <!-- Road markings -->
  <g stroke="#cbd5e1" stroke-width="4" stroke-dasharray="30,20">
    <line x1="0" y1="325" x2="600" y2="325"/>
  </g>
  
  <!-- Wrong turn sign post -->
  <g transform="translate(420, 180)">
    <!-- Post -->
    <rect x="38" y="40" width="12" height="120" fill="#64748B"/>
    <!-- Sign board -->
    <rect x="0" y="0" width="88" height="50" rx="4" fill="#ef4444"/>
    <rect x="4" y="4" width="80" height="42" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <!-- X mark -->
    <line x1="24" y1="15" x2="64" y2="35" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="64" y1="15" x2="24" y2="35" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Ground base -->
    <ellipse cx="44" cy="160" rx="25" ry="8" fill="#94a3b8"/>
  </g>
  
  <!-- Lost truck -->
  <g transform="translate(150, 200)">
    <!-- Shadow -->
    <ellipse cx="100" cy="110" rx="90" ry="15" fill="#94a3b8" opacity="0.3"/>
    
    <!-- Truck body -->
    <rect x="60" y="20" width="100" height="70" rx="8" fill="url(#truckGradient)"/>
    
    <!-- Truck cab -->
    <rect x="0" y="35" width="65" height="55" rx="8" fill="#1E3A5F"/>
    
    <!-- Window -->
    <rect x="8" y="45" width="40" height="25" rx="4" fill="#dbeafe"/>
    <rect x="12" y="48" width="15" height="19" rx="2" fill="#93c5fd" opacity="0.5"/>
    
    <!-- Wheels -->
    <circle cx="25" cy="95" r="18" fill="#334155"/>
    <circle cx="25" cy="95" r="10" fill="#64748B"/>
    <circle cx="25" cy="95" r="5" fill="#cbd5e1"/>
    
    <circle cx="100" cy="95" r="18" fill="#334155"/>
    <circle cx="100" cy="95" r="10" fill="#64748B"/>
    <circle cx="100" cy="95" r="5" fill="#cbd5e1"/>
    
    <circle cx="140" cy="95" r="18" fill="#334155"/>
    <circle cx="140" cy="95" r="10" fill="#64748B"/>
    <circle cx="140" cy="95" r="5" fill="#cbd5e1"/>
    
    <!-- Headlight -->
    <circle cx="5" cy="70" r="6" fill="#fbbf24"/>
    
    <!-- Question mark above truck -->
    <text x="75" y="-10" font-family="system-ui, sans-serif" font-size="48" fill="#3B82F6" font-weight="bold">?</text>
    
    <!-- Exhaust/confusion puffs -->
    <circle cx="-15" cy="65" r="8" fill="#cbd5e1" opacity="0.6"/>
    <circle cx="-30" cy="55" r="6" fill="#cbd5e1" opacity="0.4"/>
    <circle cx="-40" cy="45" r="4" fill="#cbd5e1" opacity="0.3"/>
  </g>
  
  <!-- Map pin indicator showing wrong location -->
  <g transform="translate(300, 100)">
    <path d="M0,40 C0,18 18,0 40,0 C62,0 80,18 80,40 C80,65 40,100 40,100 C40,100 0,65 0,40 Z" fill="#ef4444" opacity="0.2"/>
    <path d="M10,40 C10,23 23,10 40,10 C57,10 70,23 70,40 C70,58 40,85 40,85 C40,85 10,58 10,40 Z" fill="#ef4444"/>
    <circle cx="40" cy="38" r="15" fill="white"/>
    <text x="40" y="44" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444" font-weight="bold" text-anchor="middle">!</text>
  </g>
  
  <!-- Large 404 text -->
  <text x="300" y="360" font-family="system-ui, sans-serif" font-size="72" fill="#1E3A5F" font-weight="bold" text-anchor="middle" opacity="0.1">404</text>
</svg>