<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="magnifierGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background decorative circles -->
  <circle cx="320" cy="80" r="40" fill="#eff6ff" opacity="0.6"/>
  <circle cx="60" cy="220" r="30" fill="#f0fdf4" opacity="0.6"/>
  <circle cx="350" cy="250" r="25" fill="#fef3c7" opacity="0.4"/>
  
  <!-- Empty box/clipboard -->
  <g transform="translate(120, 60)">
    <!-- Clipboard base -->
    <rect x="0" y="40" width="160" height="180" rx="12" fill="url(#boxGradient)" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Clipboard top clip -->
    <rect x="50" y="20" width="60" height="30" rx="6" fill="#64748B"/>
    <rect x="60" y="25" width="40" height="8" rx="4" fill="#94a3b8"/>
    
    <!-- Paper lines suggesting content -->
    <rect x="20" y="80" width="120" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="100" width="100" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="20" y="120" width="110" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="20" y="140" width="90" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="20" y="160" width="80" height="8" rx="4" fill="#e2e8f0"/>
    
    <!-- Dashed outline for empty feel -->
    <rect x="15" y="75" width="130" height="110" rx="8" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" opacity="0.5"/>
  </g>
  
  <!-- Magnifying glass -->
  <g transform="translate(230, 140) rotate(-15)">
    <!-- Handle -->
    <rect x="45" y="55" width="16" height="50" rx="8" fill="#1E3A5F" transform="rotate(45, 53, 80)"/>
    <!-- Lens rim -->
    <circle cx="35" cy="35" r="35" fill="none" stroke="url(#magnifierGradient)" stroke-width="8"/>
    <!-- Lens glass -->
    <circle cx="35" cy="35" r="28" fill="#dbeafe" opacity="0.4"/>
    <!-- Highlight -->
    <ellipse cx="25" cy="25" rx="12" ry="8" fill="white" opacity="0.6" transform="rotate(-30, 25, 25)"/>
  </g>
  
  <!-- Floating decorative elements -->
  <g opacity="0.6">
    <circle cx="90" cy="100" r="6" fill="#3B82F6"/>
    <circle cx="310" cy="200" r="4" fill="#10B981"/>
    <circle cx="70" cy="180" r="5" fill="#64748B"/>
  </g>
  
  <!-- Question mark -->
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="32" fill="#3B82F6" font-weight="bold" opacity="0.5">?</text>
</svg>