<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>FleetFlow OG Image</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #1E3A5F 0%, #0f172a 50%, #1e293b 100%);
    }
    .accent-gradient {
      background: linear-gradient(135deg, #3B82F6 0%, #1E3A5F 100%);
    }
    .glow {
      box-shadow: 0 0 60px rgba(59, 130, 246, 0.3);
    }
    .text-glow {
      text-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
    }
  </style>
</head>
<body class="gradient-bg w-[1200px] h-[630px] relative overflow-hidden">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-10">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3B82F6" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>
  </div>
  
  <!-- Decorative circles -->
  <div class="absolute top-[-100px] right-[-100px] w-[400px] h-[400px] rounded-full bg-blue-500/10 blur-3xl"></div>
  <div class="absolute bottom-[-150px] left-[-150px] w-[500px] h-[500px] rounded-full bg-blue-600/10 blur-3xl"></div>
  
  <!-- Content Container -->
  <div class="relative z-10 flex h-full">
    <!-- Left Content -->
    <div class="w-1/2 flex flex-col justify-center pl-16 pr-8">
      <!-- Logo -->
      <div class="flex items-center space-x-4 mb-8">
        <div class="w-16 h-16 accent-gradient rounded-2xl flex items-center justify-center glow">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-4xl font-black text-white tracking-tight">FleetFlow</span>
      </div>
      
      <!-- Tagline -->
      <h1 class="text-5xl font-bold text-white leading-tight mb-6 text-glow">
        Fleet Management,<br/>
        <span class="text-blue-400">Simplified</span>
      </h1>
      
      <p class="text-xl text-gray-300 mb-8 max-w-md">
        Streamline your fleet operations with intelligent vehicle tracking, delivery management, and maintenance scheduling.
      </p>
      
      <!-- Features -->
      <div class="flex items-center space-x-6">
        <div class="flex items-center space-x-2">
          <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span class="text-gray-300 text-sm">Real-time Tracking</span>
        </div>
        <div class="flex items-center space-x-2">
          <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span class="text-gray-300 text-sm">Smart Analytics</span>
        </div>
      </div>
    </div>
    
    <!-- Right Content - UI Preview -->
    <div class="w-1/2 flex items-center justify-center pr-16">
      <!-- App Screenshot Mockup -->
      <div class="relative">
        <!-- Dashboard Card -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20 w-[400px] shadow-2xl">
          <!-- Mock Header -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 bg-blue-500 rounded-lg"></div>
              <div class="w-24 h-4 bg-white/20 rounded"></div>
            </div>
            <div class="w-8 h-8 bg-white/10 rounded-lg"></div>
          </div>
          
          <!-- Mock Stats -->
          <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-blue-500/20 rounded-xl p-4">
              <div class="w-8 h-8 bg-blue-500/40 rounded-lg mb-2"></div>
              <div class="w-16 h-3 bg-white/20 rounded mb-1"></div>
              <div class="w-8 h-5 bg-white/40 rounded"></div>
            </div>
            <div class="bg-green-500/20 rounded-xl p-4">
              <div class="w-8 h-8 bg-green-500/40 rounded-lg mb-2"></div>
              <div class="w-16 h-3 bg-white/20 rounded mb-1"></div>
              <div class="w-8 h-5 bg-white/40 rounded"></div>
            </div>
          </div>
          
          <!-- Mock Chart -->
          <div class="bg-white/5 rounded-xl p-4">
            <div class="w-24 h-3 bg-white/20 rounded mb-4"></div>
            <div class="flex items-end space-x-2 h-20">
              <div class="flex-1 bg-blue-500/40 rounded-t" style="height: 40%"></div>
              <div class="flex-1 bg-blue-500/60 rounded-t" style="height: 65%"></div>
              <div class="flex-1 bg-blue-500/80 rounded-t" style="height: 45%"></div>
              <div class="flex-1 bg-blue-500 rounded-t" style="height: 80%"></div>
              <div class="flex-1 bg-blue-400 rounded-t" style="height: 60%"></div>
              <div class="flex-1 bg-blue-300 rounded-t" style="height: 90%"></div>
              <div class="flex-1 bg-blue-200 rounded-t" style="height: 55%"></div>
            </div>
          </div>
        </div>
        
        <!-- Floating Badge -->
        <div class="absolute -bottom-4 -left-4 bg-green-500 text-white px-4 py-2 rounded-full font-semibold shadow-lg flex items-center space-x-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span>Now Available</span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bottom URL -->
  <div class="absolute bottom-8 left-0 right-0 text-center">
    <span class="text-gray-400 text-lg">www.fleetflow.app</span>
  </div>
</body>
</html>
